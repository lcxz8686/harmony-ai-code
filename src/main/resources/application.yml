spring:
  application:
    name: harmony-ai-code-service
  # session 配置
  session:
    store-type: redis
    # 30天后redis中的key就删除了
    timeout: 2592000
  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/harmony_ai_code?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 888888
  # 激活指定环境配置：设置当前应用运行在 local 本地开发环境模式 (本地调试使用)
  profiles:
    active: local
  # redis
  data:
    redis:
      host: localhost
      port: 63790
      password: 888888
      ttl: 3600

server:
  port: 8123
  servlet:
    context-path: /api
    # 前端 cookie 30天过期
    session:
      cookie:
        max-age: 2592000

# knife4j 配置
# http://localhost:8123/api/doc.html
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.harmony.harmonyaicodeservice.controller
knife4j:
  enable: true
  setting:
    language: zh_cn
